<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 听歌日记</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="css/style.css?v=20260705">
    <!-- CDN: marked.js + DOMPurify (defer 不阻塞渲染) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" defer></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 36%22><rect width=%2236%22 height=%2236%22 rx=%228%22 fill=%22%234DB88D%22/><path d=%22M11 26V14l8-1v9.5%22 stroke=%22%230B0E0C%22 stroke-width=%222.5%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 fill=%22none%22/><circle cx=%229%22 cy=%2224%22 r=%222.5%22 fill=%22%230B0E0C%22/><circle cx=%2218%22 cy=%2221.5%22 r=%222.5%22 fill=%22%230B0E0C%22/></svg>">
</head>
<body>

    <!-- ====== 整体布局容器 ====== -->
    <div class="app-layout">

        <!-- ====== 侧边栏 ====== -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <svg class="sidebar-logo-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#4DB88D"/>
                            <stop offset="100%" stop-color="#319F6A"/>
                        </linearGradient>
                    </defs>
                    <!-- 背景圆角方块 -->
                    <rect width="40" height="40" rx="10" fill="url(#logoGrad)"/>
                    <!-- 左：书页/日记本的三条横线 -->
                    <line x1="8" y1="14" x2="18" y2="14" stroke="#0B0E0C" stroke-width="2" stroke-linecap="round"/>
                    <line x1="8" y1="20" x2="18" y2="20" stroke="#0B0E0C" stroke-width="2" stroke-linecap="round"/>
                    <line x1="8" y1="26" x2="18" y2="26" stroke="#0B0E0C" stroke-width="2" stroke-linecap="round"/>
                    <!-- 书脊竖线（分隔左右） -->
                    <line x1="20" y1="10" x2="20" y2="32" stroke="#0B0E0C" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
                    <!-- 右：音符 -->
                    <path d="M25 28V16l8-1.2v10" stroke="#0B0E0C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="24.5" cy="27.5" r="2.2" fill="#0B0E0C"/>
                    <circle cx="32.5" cy="24.5" r="2.2" fill="#0B0E0C"/>
                </svg>
                <span class="sidebar-title">听歌日记</span>
            </div>

            <div class="sidebar-nav" id="sidebarNav">
                <button class="sidebar-item active" data-nav="home" data-action="nav-home">
                    <span class="sidebar-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
                    <span class="sidebar-item-label">首页</span>
                </button>
                <button class="sidebar-item" data-nav="collection" data-action="nav-collection">
                    <span class="sidebar-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
                    <span class="sidebar-item-label">歌曲汇总</span>
                </button>
                <button class="sidebar-item" data-nav="favorites" data-action="nav-favorites">
                    <span class="sidebar-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
                    <span class="sidebar-item-label">我的收藏</span>
                    <span class="sidebar-badge" id="sidebarFavCount" style="display:none">0</span>
                </button>
                <button class="sidebar-item" data-nav="playlists" data-action="nav-playlists">
                    <span class="sidebar-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span>
                    <span class="sidebar-item-label">我的歌单</span>
                </button>
            </div>

            <div class="sidebar-divider"></div>

            <div class="sidebar-section-label">创作</div>
            <div class="sidebar-nav">
                <button class="sidebar-item" data-nav="notes" data-action="nav-notes">
                    <span class="sidebar-item-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></span>
                    <span class="sidebar-item-label">听歌笔记</span>
                </button>
            </div>

            <div class="sidebar-divider"></div>

            <div class="sidebar-section-label">热门标签</div>
            <div class="sidebar-tags" id="sidebarTags">
                <button class="sidebar-tag-item" data-action="nav-collection-hot">
                    <span class="tag-dot" style="background:#E74C3C"></span>
                    热榜
                </button>
                <button class="sidebar-tag-item" data-action="nav-collection-classic">
                    <span class="tag-dot" style="background:#F39C12"></span>
                    拾光
                </button>
                <button class="sidebar-tag-item" data-action="nav-collection-yueyu">
                    <span class="tag-dot" style="background:#3498DB"></span>
                    粤韵
                </button>
                <button class="sidebar-tag-item" data-action="nav-collection-ktv">
                    <span class="tag-dot" style="background:#9B59B6"></span>
                    欢唱
                </button>
                <button class="sidebar-tag-item" data-action="nav-collection-minyao">
                    <span class="tag-dot" style="background:#1ABC9C"></span>
                    民谣
                </button>
            </div>

            <div class="sidebar-spacer"></div>

            <div class="sidebar-user" id="sidebarUser">
                <button class="btn-login" id="btnLogin" data-action="show-auth"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-4px;margin-right:6px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>登录</button>
                <div class="user-menu-wrap" id="userMenuWrap" style="display:none">
                    <button class="btn-user-avatar" id="btnUserAvatar" data-action="toggle-user-menu">
                        <img class="sidebar-avatar-img" id="sidebarAvatarImg" src="" alt="" style="display:none">
                        <span class="sidebar-avatar-placeholder" id="sidebarAvatarPH"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                    </button>
                    <div class="user-menu-info">
                        <span class="user-menu-name" id="btnUserLabel">用户</span>
                    </div>
                    <div class="user-dropdown" id="userDropdown" style="display:none">
                        <div class="user-dropdown-item" data-action="change-username"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>修改用户名</div>
                        <div class="user-dropdown-item" data-action="change-avatar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>更换头像</div>
                        <div class="user-dropdown-item" data-action="logout"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出登录</div>
                    </div>
                </div>
                <button class="sidebar-feedback-link" data-action="show-feedback"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>意见反馈</button>
            </div>
        </nav>

        <!-- ====== 主内容区 ====== -->
        <div class="content-wrapper">
            <!-- 顶部栏 -->
            <header class="top-bar" id="topBar">
                <button class="btn-menu" id="btnMenu" data-action="toggle-sidebar" aria-label="菜单">☰</button>
                <form class="search-wrap" id="searchWrap" autocomplete="off">
                    <!-- 隐藏的 autofill 陷阱：防止 Chrome 把邮箱填入搜索框 -->
                    <input type="email" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;left:-9999px" tabindex="-1" aria-hidden="true" autocomplete="email">
                    <input type="text" class="search-input" id="searchInput" name="search" placeholder="搜索歌曲、歌手…" autocomplete="off">
                    <svg class="search-magnifier" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <button type="button" class="search-clear" id="searchClear" style="display:none">✕</button>
                    <span class="search-spinner" id="searchSpinner"></span>
                    <button type="button" class="search-confirm" id="searchConfirm">确认</button>
                    <div class="search-history-dropdown" id="searchDropdown" style="display:none"></div>
                </form>
                <div class="top-bar-spacer"></div>
            </header>

            <!-- 内容视图 -->
            <main class="content-area" id="contentArea">
                <div class="view-header" id="viewHeader" style="display:none">
                    <button class="btn-back" id="btnBack" data-action="nav-back">← 返回</button>
                    <span class="view-title" id="viewTitle"></span>
                </div>
                <div class="section-header" id="sectionHeader" style="display:none"></div>
                <div class="view-container" id="viewContainer">
                    <!-- 动态渲染：标签卡片网格 / 歌曲封面网格 / 歌曲列表 / 收藏 / 歌单 -->
                </div>
            </main>

        </div>

        <!-- ====== 沉浸式 Now Playing 层 ====== -->
        <div class="now-playing-overlay" id="nowPlayingOverlay" style="display:none">
            <div class="npo-backdrop" id="npoBackdrop"></div>
            <button class="npo-close" id="npoClose" data-action="close-now-playing">←</button>
            <div class="npo-content">
                <div class="npo-cover-wrap">
                    <img class="npo-cover" id="npoCover" src="" alt="">
                </div>
                <div class="npo-info">
                    <h2 class="npo-title" id="npoTitle"></h2>
                    <p class="npo-singer" id="npoSinger"></p>
                </div>
                <div class="npo-progress">
                    <span class="progress-time" id="npoTimeCurrent">0:00</span>
                    <div class="progress-bar-wrap" id="npoProgressWrap">
                        <div class="progress-bar-fill" id="npoProgressFill"></div>
                    </div>
                    <span class="progress-time" id="npoTimeTotal">0:00</span>
                </div>
                <div class="npo-controls">
                    <button class="btn-ctrl npo-btn" id="npoBtnPrev" data-action="prev">⏮</button>
                    <button class="btn-ctrl npo-play-btn" id="npoBtnPlay" data-action="toggle-play">▶</button>
                    <button class="btn-ctrl npo-btn" id="npoBtnNext" data-action="next">⏭</button>
                </div>
                <div class="npo-actions">
                    <button class="npo-action-btn" id="npoBtnFav" data-action="toggle-fav">♡ 收藏</button>
                    <button class="npo-action-btn" id="npoBtnAddPl" data-action="show-add-to-playlist">📋 添加到歌单</button>
                </div>
            </div>
        </div>

        <!-- ====== 底部播放栏 ====== -->
        <footer class="player-bar" id="playerBar">
            <div class="player-now" id="playerNow">
                <div class="player-cover-wrap" id="playerCoverWrap" data-action="open-now-playing">
                    <img class="player-cover" id="playerCover" src="" alt="" style="display:none">
                    <span class="player-cover-placeholder" id="playerCoverPH">🎵</span>
                </div>
                <div class="player-meta">
                    <span class="player-title" id="nowPlayingTitle">未在播放</span>
                    <span class="player-singer" id="nowPlayingSinger"></span>
                </div>
            </div>

            <div class="player-center">
                <div class="player-controls">
                    <button class="btn-ctrl btn-mode loop-all" id="btnMode" title="列表循环" data-action="toggle-mode"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 7 7 2 12 7"/><path d="M7 22V2"/><polyline points="22 17 17 22 12 17"/><path d="M17 2v20"/></svg></button>
                    <button class="btn-ctrl" id="btnPrev" data-action="prev">⏮</button>
                    <button class="btn-ctrl play-btn" id="btnPlay" data-action="toggle-play">▶</button>
                    <button class="btn-ctrl" id="btnNext" data-action="next">⏭</button>
                    <button class="btn-ctrl btn-lyrics-text" id="btnLyrics" data-action="open-lyrics" title="歌词">歌词</button>
                </div>
                <div class="player-progress">
                    <span class="progress-time" id="timeCurrent">0:00</span>
                    <div class="progress-bar-wrap" id="progressWrap">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <span class="progress-time" id="timeTotal">0:00</span>
                </div>
            </div>

            <div class="player-right">
                <button class="btn-ctrl btn-volume" id="btnVolume" data-action="toggle-volume" title="音量">🔊</button>
                <div class="volume-popup" id="volumePopup" style="display:none">
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" orient="vertical">
                </div>
            </div>
        </footer>

        <!-- ====== 嵌入式歌词面板 ====== -->
        <div class="lyrics-panel" id="lyricsPanel">
            <div class="lyrics-panel-header">
                <div class="lyrics-panel-song-info">
                    <span class="lyrics-panel-title" id="embeddedLyricsTitle">歌词</span>
                    <span class="lyrics-panel-singer" id="embeddedLyricsSinger"></span>
                </div>
                <div class="lyrics-offset-controls" id="lyricsOffsetControls">
                    <button class="lyrics-offset-btn" id="btnOffsetMinus" title="歌词提前0.5秒">−0.5s</button>
                    <span class="lyrics-offset-val" id="lyricsOffsetVal">±0.0s</span>
                    <button class="lyrics-offset-btn" id="btnOffsetPlus" title="歌词延后0.5秒">+0.5s</button>
                    <button class="lyrics-offset-btn lyrics-offset-reset" id="btnOffsetReset" title="重置偏移">↺</button>
                </div>
                <button class="lyrics-panel-btn" id="btnLyricsPopout" title="弹出独立窗口">↗</button>
                <button class="lyrics-panel-btn" id="btnLyricsClose" title="关闭歌词面板">✕</button>
            </div>
            <div class="lyrics-panel-body" id="lyricsPanelBody">
                <div class="lyrics-empty">
                    <div class="empty-icon">🎵</div>
                    <div>等待播放...</div>
                </div>
            </div>
        </div>

    </div><!-- /app-layout -->

    <!-- ====== 手机侧边抽屉 (mobile < 768px) ====== -->
    <div class="mobile-drawer-overlay" id="mobileDrawerOverlay"></div>
    <div class="mobile-drawer" id="mobileDrawer">
        <div class="mobile-drawer-header">
            <button class="mobile-drawer-close" id="mobileDrawerClose" aria-label="关闭菜单">✕</button>
        </div>
        <div class="mobile-drawer-body" id="mobileDrawerBody">
            <!-- sidebar 内容由 JS 动态克隆 -->
        </div>
    </div>

    <!-- ====== 平板底部抽屉 ====== -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer-sheet" id="drawerSheet">
        <div class="drawer-handle"></div>
        <div class="drawer-content" id="drawerContent">
            <div class="drawer-tabs">
                <button class="drawer-tab active" data-drawer-tab="fav">⭐ 收藏</button>
                <button class="drawer-tab" data-drawer-tab="pl">📋 歌单</button>
            </div>
            <div class="drawer-panel" id="drawerFav"><!-- 收藏列表 --></div>
            <div class="drawer-panel" id="drawerPl" style="display:none"><!-- 歌单列表 --></div>
        </div>
    </div>
    <button class="fab-drawer-trigger" id="fabDrawer" title="收藏 & 歌单" aria-label="收藏和歌单">⭐</button>

    <!-- ====== Modal ====== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>

    <!-- ====== Scripts ====== -->
    <script src="js/auth.js"></script>
    <script src="js/playlist.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ui.js?v=20260704"></script>
    <script>
        // 启动应用
        (async function bootstrap() {
            try {
                // 并行请求歌曲列表 + 首页聚合数据
                // 首页数据预取后挂到 window._prefetchedHomeData，renderNewHome() 优先复用，省一次往返
                const songsPromise = fetch('/api/songs?bvid=BV1pr6aYiE97&limit=300');
                const homePromise = fetch('/api/home').then(r => r.ok ? r.json() : null).catch(() => null);
                homePromise.then(d => { if (d) window._prefetchedHomeData = d; });

                const songsResp = await songsPromise;
                if (!songsResp.ok) throw new Error('无法获取歌曲列表');
                const songs = await songsResp.json();
                window._bootstrapHomePromise = homePromise;
                UI.init(songs);
            } catch (err) {
                console.error('启动失败:', err);
                document.getElementById('viewContainer').innerHTML = `
                    <div class="empty-state" style="padding:60px 20px">
                        <span class="empty-icon">⚠️</span>
                        无法连接后端服务<br>
                        <small style="color:var(--text-tertiary)">请确保已启动后端服务 (node server.js)</small>
                    </div>`;
            }
        })();
    </script>

</body>
</html>
